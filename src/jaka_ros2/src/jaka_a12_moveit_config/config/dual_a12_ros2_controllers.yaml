# This config is used only by the dual-arm Gazebo prototype.
controller_manager:
  ros__parameters:
    update_rate: 1000

    left_jaka_a12_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_jaka_a12_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

left_jaka_a12_controller:
  ros__parameters:
    joints:
      - left_joint_1
      - left_joint_2
      - left_joint_3
      - left_joint_4
      - left_joint_5
      - left_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

right_jaka_a12_controller:
  ros__parameters:
    joints:
      - right_joint_1
      - right_joint_2
      - right_joint_3
      - right_joint_4
      - right_joint_5
      - right_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
